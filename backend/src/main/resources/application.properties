spring.application.name=backend
spring.datasource.url=jdbc:postgresql://localhost:5432/EasySchedule
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
# Valor	| Comportamiento
# none	| No hace nada con el esquema (recomendado en producción)
# validate	| Valida que el esquema coincida con las entidades, pero no lo modifica
# update	| Actualiza el esquema agregando columnas/tablas faltantes, sin borrar nada
# create	| Crea el esquema al iniciar, borrando lo existente al startup
# create-drop	| Crea el esquema al iniciar y lo elimina al cerrar la aplicación

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.output.ansi.enabled=ALWAYS
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(${LOG_LEVEL_PATTERN:%5p}) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:%wEx}
