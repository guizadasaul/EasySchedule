spring.config.import=optional:file:.env[.properties]

spring.application.name=backend
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/EasySchedule}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.sql.init.mode=never
#spring.sql.init.schema-locations=classpath:db/schema.sql
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.sql.init.SqlInitializationAutoConfiguration
#spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

spring.output.ansi.enabled=ALWAYS
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(${LOG_LEVEL_PATTERN:%5p}) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:%wEx}
