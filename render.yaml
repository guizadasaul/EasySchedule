services:
  - type: web
    name: easyschedule-backend
    runtime: java
    rootDir: backend
    plan: free
    buildCommand: ./gradlew clean bootJar -x test
    startCommand: sh -c "java -Dserver.port=$PORT -jar build/libs/*SNAPSHOT.jar"
    envVars:
      - key: JAVA_VERSION
        value: 17
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
