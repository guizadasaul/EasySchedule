name: CI/CD

on:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master"]

permissions:
  contents: read

jobs:
  backend-ci:
    name: Backend CI (build + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run backend build (includes tests)
        run: ./gradlew --no-daemon build

  frontend-ci:
    name: Frontend CI (test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Clean Angular cache
        run: rm -rf .angular/cache

      - name: Run frontend tests
        run: npm test -- --watch=false --browsers=ChromeHeadless --no-progress

      - name: Run frontend build
        run: npm run build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Netlify deploy
        env:
          NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "$NETLIFY_BUILD_HOOK_URL" ]; then
            echo "NETLIFY_BUILD_HOOK_URL secret is missing"
            exit 1
          fi

          echo "Triggering Netlify deploy..."
          curl --fail --show-error --silent --location --request POST "$NETLIFY_BUILD_HOOK_URL"
          echo "Netlify deploy triggered successfully."

      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret is missing"
            exit 1
          fi

          echo "Triggering Render deploy..."
          curl --fail --show-error --silent --location --request POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deploy triggered successfully."
