
<section class="home-principal">
  <div class="home-principal-background" aria-hidden="true"></div>
  <div class="home-principal-content">
    <h1>{{ 'home.title' | translate }}</h1>
    <h3 class="home-subtitle">{{ 'home.subtitle' | translate }}</h3>
    <p>{{ 'home.description' | translate }}</p>
    <button class="btn-primary">{{ 'home.button.start' | translate }}</button>
  </div>
</section>

<main class="home-status">
  <h1>{{ 'home.title' | translate }}</h1>
  <p>{{ 'home.backendStatusLabel' | translate }}</p>
  <pre>{{ healthStatusKey() | translate: healthStatusParams() }}</pre>
</main>
