<div class="registro-container">

  <div class="registro-image"></div>

  <div class="registro-panel">

    <div class="logo">
      EASY<br>SCHEDULE
    </div>

    <h1>Registro</h1>

    <form [formGroup]="form" (ngSubmit)="registrar()" class="registro-form">

      <div class="form-group">
        <label>Nombre</label>
        <input type="text" formControlName="nombre" placeholder="Ingresar nombre">
        <small *ngIf="form.get('nombre')?.touched && form.get('nombre')?.invalid">
          El nombre es obligatorio
        </small>
      </div>

      <div class="form-group">
        <label>Apellido</label>
        <input type="text" formControlName="apellido" placeholder="Ingresar apellido">
        <small *ngIf="form.get('apellido')?.touched && form.get('apellido')?.invalid">
          El apellido es obligatorio
        </small>
      </div>

      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" formControlName="correo" placeholder="Ingresar email">
        <small *ngIf="form.get('correo')?.errors?.['required']">
          El correo es obligatorio
        </small>
        <small *ngIf="form.get('correo')?.errors?.['email']">
          Formato de correo inválido
        </small>
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" formControlName="password">
        <small *ngIf="form.get('password')?.errors?.['minlength']">
          La contraseña debe tener mínimo 8 caracteres
        </small>
      </div>

      <div class="form-group">
        <label>Confirmar contraseña</label>
        <input type="password" formControlName="confirmPassword">
        <small *ngIf="form.get('confirmPassword')?.errors?.['mismatch']">
          Las contraseñas no coinciden
        </small>
      </div>

      <button type="submit" class="btn-primary" [disabled]="form.invalid || loading">
        Registrarse
      </button>

      <button type="button" class="btn-secondary">
        Ir a Iniciar Sesión
      </button>

      <p *ngIf="loading" class="loading">
        Registrando usuario...
      </p>

    </form>

  </div>

</div>
