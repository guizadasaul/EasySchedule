<div class="registro-page">
    <div class="registro-shell" [class.is-loading]="loading">
  
      <section class="registro-image" aria-hidden="true"></section>
  
      <section class="registro-panel">
        <a routerLink="/home" class="panel-back-link">
          {{ 'login.button.backHome' | translate }}
        </a>

        <div class="logo" aria-hidden="true">
          {{ 'brand.main' | translate }}
          <span>{{ 'brand.sub' | translate }}</span>
        </div>
  
        <h1>{{ 'login.title' | translate }}</h1>
  
        <form [formGroup]="form" (ngSubmit)="login()" class="registro-form" novalidate>
  
          <!-- IDENTIFIER -->
          <div class="form-group">
            <label for="identifier">{{ 'login.label.identifier' | translate }}</label>
  
            <input
              id="identifier"
              type="text"
              formControlName="identifier"
              [placeholder]="'login.placeholder.identifier' | translate"
            />
  
            <small class="form-error" *ngIf="form.get('identifier')?.touched && form.get('identifier')?.invalid">
              {{ 'login.validation.required' | translate }}
            </small>
          </div>
  
          <!-- PASSWORD -->
          <div class="form-group">
            <label for="password">{{ 'login.label.password' | translate }}</label>
            <div class="input-with-icon">
              <input
                id="password"
                [type]="showPassword ? 'text' : 'password'"
                formControlName="password"
                [placeholder]="'login.placeholder.password' | translate"
              />
              <button type="button" class="toggle-password" (click)="togglePasswordVisibility()" aria-label="Toggle password visibility">
                <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path></svg>
              </button>
            </div>
  
            <small class="form-error" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
              {{ 'login.validation.required' | translate }}
            </small>
          </div>
  
          <!-- BOTÓN -->
          <button type="submit" class="btn-primary" [class.btn-loading]="loading" [disabled]="form.invalid || loading">
            <span class="btn-text">{{ 'login.button.submit' | translate }}</span>
            <div class="spinner"></div>
          </button>
  
          <!-- LINKS -->
          <a routerLink="/registro" class="btn-secondary">
            {{ 'login.button.gotoRegister' | translate }}
          </a>
  
        </form>
      </section>
    </div>
  </div>
